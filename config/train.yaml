# Training configuration
data:
  processed_path: "data/processed/panel.parquet"
  characteristics: ["size", "bm", "mom", "prof", "inv", "vol"]
  return_col: "ret_excess"
  date_col: "date"
  entity_col: "permno"

model:
  # w_rank: null  → full D×D weight matrix W (exact Kelly et al. 2025 form)
  # w_rank: 16    → factored form W = W_Q^T W_K with W_Q, W_K ∈ R^{16 × D}
  w_rank: null

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  seed: 42

output:
  model_dir: "outputs/models"
  checkpoint: "outputs/models/linear_attn.pt"
